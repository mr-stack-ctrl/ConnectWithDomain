<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="manifest.json">
    <title>Government Exam Portal</title>
    <style>
      :root {
        --bg: #eef4ff;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0b5ed7;
        --primary-2: #0a4fb3;
        --success: #16a34a;
        --border: rgba(15, 23, 42, 0.12);
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, #e8f1ff, var(--bg));
        color: var(--text);
      }

      header {
        background: linear-gradient(90deg, var(--primary), #0f766e);
        color: white;
        padding: 16px 18px;
        box-shadow: var(--shadow);
      }

      header .wrap {
        max-width: 980px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      header h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 700;
      }

      header .meta {
        font-size: 12px;
        opacity: 0.95;
      }

      main {
        max-width: 980px;
        margin: 18px auto 40px;
        padding: 0 14px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 16px;
      }

      .top-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
      }

      label {
        font-size: 13px;
        color: var(--muted);
        display: block;
        margin-bottom: 8px;
      }

      select {
        width: 100%;
        height: 42px;
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 0 12px;
        font-size: 14px;
        outline: none;
        background: #fff;
      }

      .btn {
        height: 42px;
        border-radius: 10px;
        border: 1px solid rgba(11, 94, 215, 0.25);
        background: var(--primary);
        color: #fff;
        padding: 0 14px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.03s ease, filter 0.2s ease;
        white-space: nowrap;
      }

      .btn:disabled {
        cursor: not-allowed;
        filter: grayscale(0.5);
        opacity: 0.7;
      }

      .btn:hover:not(:disabled) {
        filter: brightness(1.02);
      }

      .btn.secondary {
        background: transparent;
        color: var(--primary-2);
        border-color: rgba(11, 94, 215, 0.25);
      }

      .hint {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .questions {
        margin-top: 14px;
        display: grid;
        gap: 12px;
      }

      .question-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        background: #fbfdff;
      }

      .question-title {
        margin: 0 0 10px;
        font-size: 15px;
        line-height: 1.35;
        font-weight: 700;
      }

      .options {
        display: grid;
        gap: 8px;
      }

      .option {
        border: 1px solid rgba(15, 23, 42, 0.1);
        background: #fff;
        border-radius: 12px;
        padding: 10px 12px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
        cursor: pointer;
      }

      .option input {
        margin-top: 2px;
        transform: scale(1.05);
      }

      .option .opt-text {
        font-size: 14px;
        line-height: 1.35;
      }

      .option .opt-key {
        font-weight: 800;
        color: var(--primary-2);
        min-width: 22px;
      }

      .footer-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      .loader {
        display: none;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .loader .spinner {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 2px solid rgba(11, 94, 215, 0.18);
        border-top-color: var(--primary);
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error {
        margin-top: 10px;
        color: #b91c1c;
        font-size: 13px;
        font-weight: 700;
      }

      @media (max-width: 720px) {
        .top-row {
          grid-template-columns: 1fr;
        }
        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <h1>Government Exam Portal</h1>
        <div class="meta">Online MCQ Practice • Submit for Result</div>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="top-row">
          <div>
            <label for="examSelect">Select Exam</label>
            <select id="examSelect" disabled>
              <option value="">Loading exams...</option>
            </select>
            <div class="hint">Changing the dropdown loads questions automatically.</div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 10px; align-items: flex-end;">
            <div class="loader" id="loader">
              <div class="spinner"></div>
              <div id="loaderText">Loading questions...</div>
            </div>
            <button class="btn secondary" type="button" id="reloadBtn" disabled>Reload Exams</button>
          </div>
        </div>

        <div id="errorBox" class="error" style="display: none;"></div>

        <form id="examForm" autocomplete="off">
          <div class="questions" id="questions"></div>

          <div class="footer-row">
            <div class="hint" id="statusText">Select an exam to begin.</div>
            <button class="btn" type="submit" id="submitBtn" disabled>Submit Answers</button>
          </div>
        </form>
      </section>
    </main>

    <script>

      if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/service-worker.js')
      .then(function (registration) {
        console.log('Service Worker registered successfully:', registration.scope);
      })
      .catch(function (error) {
        console.log('Service Worker registration failed:', error);
      });
  });
}
      
      (function () {
        const apiBase = "https://curiosity-box.onrender.com/exam";

        const examSelect = document.getElementById("examSelect");
        const questionsEl = document.getElementById("questions");
        const submitBtn = document.getElementById("submitBtn");
        const errorBox = document.getElementById("errorBox");
        const statusText = document.getElementById("statusText");
        const loader = document.getElementById("loader");
        const loaderText = document.getElementById("loaderText");
        const reloadBtn = document.getElementById("reloadBtn");
        const examForm = document.getElementById("examForm");

        let currentQuestions = [];
        let currentExamName = "";

        function showError(message) {
          errorBox.textContent = message;
          errorBox.style.display = "block";
        }

        function clearError() {
          errorBox.textContent = "";
          errorBox.style.display = "none";
        }

        function setLoading(isLoading, text) {
          loader.style.display = isLoading ? "flex" : "none";
          if (text) loaderText.textContent = text;
        }

        function clearQuestions() {
          questionsEl.innerHTML = "";
        }

        function safeText(s) {
          return String(s ?? "");
        }

        function renderQuestions(questions) {
          clearQuestions();
          currentQuestions = Array.isArray(questions) ? questions : [];

          if (currentQuestions.length === 0) {
            statusText.textContent = "No questions returned from API.";
            submitBtn.disabled = true;
            return;
          }

          // Ensure stable order by questionNumber when possible
          const sorted = [...currentQuestions].sort((a, b) => {
            const an = Number(a.questionNumber);
            const bn = Number(b.questionNumber);
            if (Number.isFinite(an) && Number.isFinite(bn)) return an - bn;
            return 0;
          });

          for (const q of sorted) {
            const qNum = q.questionNumber;
            const title = safeText(q.questionText);

            const card = document.createElement("div");
            card.className = "question-card";

            const h = document.createElement("h3");
            h.className = "question-title";
            h.textContent = `Q${qNum}. ${title}`;
            card.appendChild(h);

            const optionsWrap = document.createElement("div");
            optionsWrap.className = "options";

            const optionsObj = q.options || {};
            const optionKeys = ["A", "B", "C", "D"].filter((k) => Object.prototype.hasOwnProperty.call(optionsObj, k));

            if (optionKeys.length === 0) {
              const empty = document.createElement("div");
              empty.className = "hint";
              empty.textContent = "No options found for this question.";
              optionsWrap.appendChild(empty);
            } else {
              for (const key of optionKeys) {
                const optText = safeText(optionsObj[key]);

                const label = document.createElement("label");
                label.className = "option";

                const input = document.createElement("input");
                input.type = "radio";
                input.name = `q_${qNum}`;
                input.value = key;

                const spanKey = document.createElement("div");
                spanKey.className = "opt-key";
                spanKey.textContent = key;

                const spanText = document.createElement("div");
                spanText.className = "opt-text";
                spanText.textContent = optText;

                label.appendChild(input);
                label.appendChild(spanKey);
                label.appendChild(spanText);

                optionsWrap.appendChild(label);
              }
            }

            card.appendChild(optionsWrap);
            questionsEl.appendChild(card);
          }

          statusText.textContent = "Choose your options and submit.";
          submitBtn.disabled = false;
        }

        async function fetchExamNames() {
          setLoading(true, "Loading exam names...");
          clearError();
          examSelect.disabled = true;
          submitBtn.disabled = true;
          clearQuestions();
          statusText.textContent = "Loading exam names...";

          const res = await fetch(apiBase + "/exam-name", { method: "GET" });
          if (!res.ok) throw new Error("Failed to load exam names.");
          const data = await res.json();

          if (!Array.isArray(data)) throw new Error("Exam names response is not an array.");

          examSelect.innerHTML = '<option value="">Select an exam</option>';
          for (const name of data) {
            const opt = document.createElement("option");
            opt.value = safeText(name);
            opt.textContent = safeText(name);
            examSelect.appendChild(opt);
          }

          examSelect.disabled = false;
          reloadBtn.disabled = false;
          statusText.textContent = "Select an exam to begin.";
          setLoading(false);
        }

        async function fetchQuestions(examName) {
          setLoading(true, "Loading questions...");
          clearError();
          submitBtn.disabled = true;
          statusText.textContent = "Loading questions...";
          clearQuestions();

          const url = apiBase + "/get-question?examName=" + encodeURIComponent(examName);
          const res = await fetch(url, { method: "GET" });
          if (!res.ok) throw new Error("Failed to load questions for this exam.");
          const data = await res.json();

          renderQuestions(data);
          setLoading(false);
        }

        examSelect.addEventListener("change", async function () {
          const examName = examSelect.value;
          currentExamName = examName;
          if (!examName) {
            currentQuestions = [];
            submitBtn.disabled = true;
            clearQuestions();
            statusText.textContent = "Select an exam to begin.";
            return;
          }

          try {
            await fetchQuestions(examName);
          } catch (err) {
            setLoading(false);
            showError(err?.message || "Error loading questions.");
            statusText.textContent = "Please try selecting a different exam.";
          }
        });

        reloadBtn.addEventListener("click", async function () {
          try {
            await fetchExamNames();
          } catch (err) {
            showError(err?.message || "Error loading exam names.");
            setLoading(false);
          }
        });

        examForm.addEventListener("submit", async function (e) {
          e.preventDefault();
          clearError();

          if (!currentExamName) {
            showError("Please select an exam first.");
            return;
          }
          if (!Array.isArray(currentQuestions) || currentQuestions.length === 0) {
            showError("No questions to submit.");
            return;
          }

          const payload = [];
          let attemptedCount = 0;

          for (const q of currentQuestions) {
            const qNum = q.questionNumber;
            const checked = examForm.querySelector(`input[name="q_${qNum}"]:checked`);
            if (checked) attemptedCount += 1;
            payload.push({
              questionNumber: qNum,
              // Keep payload shape consistent for the backend: empty string means "not attempted".
              optionsChoosed: checked ? checked.value : "",
            });
          }

          if (attemptedCount === 0) {
            showError("Please select at least one option before submitting.");
            return;
          }

          submitBtn.disabled = true;
          statusText.textContent = "Submitting your answers...";
          setLoading(true, "Submitting result...");

          try {
            const submitUrl = apiBase + "/submit-result/" + encodeURIComponent(currentExamName);
            const res = await fetch(submitUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!res.ok) throw new Error("Failed to submit result.");

            const result = await res.json();

            const totalQuestions = Number(result?.totalQuestions ?? currentQuestions.length);
            const notAttemptedCount = Math.max(0, totalQuestions - attemptedCount);

            sessionStorage.setItem(
              "examResult",
              JSON.stringify({
                ...result,
                examName: currentExamName,
                attemptedCount,
                notAttemptedCount,
                accuracyPercent: totalQuestions > 0 ? ((Number(result?.correctAnswers ?? 0) / totalQuestions) * 100) : 0,
              })
            );

            window.location.href = "result.html";
          } catch (err) {
            showError(err?.message || "Error submitting result.");
            statusText.textContent = "Please try again.";
            setLoading(false);
            submitBtn.disabled = false;
          }
        });

        // Initial load
        fetchExamNames().catch((err) => {
          showError(err?.message || "Error loading exam names.");
          setLoading(false);
          statusText.textContent = "Unable to load exams. Check backend server/CORS.";
        });
      })();
    </script>
  </body>
</html>
