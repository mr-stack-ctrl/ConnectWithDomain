<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%230b3a8a'/%3E%3Cstop offset='100%25' stop-color='%23059b8a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' font-family='Segoe UI,Arial' font-size='26' fill='white' font-weight='700'%3EGA%3C/text%3E%3C/svg%3E"
    />
    <meta name="theme-color" content="#0b3a8a" />
    <title>gattu academy - Result</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --surface: #ffffff;
        --surface-soft: #f9fbff;
        --text: #132238;
        --muted: #5d6c80;
        --line: #dbe4ef;
        --primary: #0b3a8a;
        --accent: #0c9a8b;
        --ok: #157f46;
        --bad: #b4232e;
        --shadow: 0 12px 30px rgba(19, 34, 56, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #f0f5ff, var(--bg) 30%, var(--bg));
      }

      .topbar {
        background: #fff;
        border-bottom: 1px solid var(--line);
      }

      .topbar-inner {
        max-width: 1100px;
        margin: 0 auto;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        font-weight: 800;
        color: #fff;
        background: linear-gradient(145deg, var(--primary), var(--accent));
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .brand p {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .back-link {
        border: 1px solid #b8c8dc;
        background: #f6f9fd;
        color: #24466d;
        border-radius: 10px;
        padding: 8px 12px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 700;
      }

      .back-link:hover {
        box-shadow: 0 8px 14px rgba(31, 62, 102, 0.12);
      }

      main {
        max-width: 1100px;
        margin: 18px auto 30px;
        padding: 0 16px;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .title-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .title-row h2 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .small {
        font-size: 12px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: 290px 1fr;
        gap: 14px;
      }

      .donut-wrap {
        background: var(--surface-soft);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        display: grid;
        place-items: center;
      }

      .accuracy-circle {
        position: relative;
        width: min(70vw, 230px);
        aspect-ratio: 1 / 1;
      }

      .accuracy-circle svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .accuracy-center {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .percent {
        font-size: 32px;
        font-weight: 700;
        color: #1a3f73;
      }

      .label {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .score-hint {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .stat-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 12px;
      }

      .stat-card .k {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 5px;
      }

      .stat-card .v {
        font-size: 20px;
        font-weight: 700;
      }

      .ok {
        color: var(--ok);
      }

      .bad {
        color: var(--bad);
      }

      .error {
        margin-top: 10px;
        color: var(--bad);
        font-size: 13px;
        font-weight: 700;
      }

      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .topbar-inner {
          align-items: flex-start;
          flex-direction: column;
        }
        .panel {
          padding: 14px;
        }
        .stat-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="logo" aria-label="gattu academy logo">GA</div>
          <div>
            <h1>Gattu Academy</h1>
            <p>Result Dashboard</p>
          </div>
        </div>
        <a class="back-link" href="index.html">Back to Test</a>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="title-row">
          <div>
            <h2>Your Performance</h2>
            <p class="subtitle" id="examNameText">Loading...</p>
          </div>
          <div class="small" id="accuracyNote"></div>
        </div>

        <div class="grid">
          <div class="donut-wrap">
            <div class="accuracy-circle" aria-label="Accuracy percentage">
              <svg viewBox="0 0 240 240">
                <defs>
                  <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1">
                    <stop offset="0%" stop-color="#1f57b4" />
                    <stop offset="100%" stop-color="#0c9a8b" />
                  </linearGradient>
                </defs>
                <circle cx="120" cy="120" r="92" stroke="rgba(19,34,56,0.12)" stroke-width="16" fill="none" />
                <circle
                  id="progressCircle"
                  cx="120"
                  cy="120"
                  r="92"
                  stroke="url(#grad)"
                  stroke-width="16"
                  fill="none"
                  stroke-linecap="round"
                  transform="rotate(-90 120 120)"
                  stroke-dasharray="0 9999"
                />
              </svg>
              <div class="accuracy-center">
                <div class="percent" id="percentText">0%</div>
                <div class="label">Accuracy</div>
              </div>
            </div>
            <div class="score-hint" id="scoreHint"></div>
          </div>

          <div class="stat-grid">
            <div class="stat-card">
              <div class="k">Total Questions</div>
              <div class="v" id="totalQuestionsText">-</div>
            </div>
            <div class="stat-card">
              <div class="k">Total Attempted</div>
              <div class="v ok" id="attemptedText">-</div>
            </div>
            <div class="stat-card">
              <div class="k">Not Attempted</div>
              <div class="v bad" id="notAttemptedText">-</div>
            </div>
            <div class="stat-card">
              <div class="k">Total Marks (Score)</div>
              <div class="v" id="scoreText">-</div>
            </div>
            <div class="stat-card">
              <div class="k">Correct Answers</div>
              <div class="v" id="correctAnswersText">-</div>
            </div>
          </div>
        </div>

        <div id="errorBox" class="error" style="display: none;"></div>
      </section>
    </main>

    <script>
      (function () {
        const errorBox = document.getElementById("errorBox");
        const progressCircle = document.getElementById("progressCircle");

        const examNameText = document.getElementById("examNameText");
        const accuracyNote = document.getElementById("accuracyNote");
        const percentText = document.getElementById("percentText");
        const scoreHint = document.getElementById("scoreHint");

        const totalQuestionsText = document.getElementById("totalQuestionsText");
        const attemptedText = document.getElementById("attemptedText");
        const notAttemptedText = document.getElementById("notAttemptedText");
        const scoreText = document.getElementById("scoreText");
        const correctAnswersText = document.getElementById("correctAnswersText");

        function showError(msg) {
          errorBox.textContent = msg;
          errorBox.style.display = "block";
        }

        function setCircleProgress(percent) {
          const p = Math.max(0, Math.min(100, Number(percent) || 0));

          const r = 92;
          const circumference = 2 * Math.PI * r;
          const dashArray = circumference;
          const dashOffset = circumference * (1 - p / 100);

          progressCircle.setAttribute("stroke-dasharray", dashArray + " " + dashArray);
          progressCircle.setAttribute("stroke-dashoffset", dashOffset);
        }

        function fmtPercent(p) {
          return Math.round((Number(p) || 0) * 10) / 10;
        }

        try {
          const raw = sessionStorage.getItem("examResult");
          if (!raw) {
            showError("No result data found. Please submit an exam first.");
            return;
          }
          const result = JSON.parse(raw);

          const examName = result?.examName ?? "";
          examNameText.textContent = examName ? `Exam: ${examName}` : "Exam: -";

          const totalQuestions = Number(result?.totalQuestions ?? 0);
          const correctAnswers = Number(result?.correctAnswers ?? 0);
          const score = Number(result?.score ?? 0);
          const attemptedCount = Number(result?.attemptedCount ?? 0);
          const notAttemptedCount = Number(result?.notAttemptedCount ?? 0);

          const accuracyPercent = totalQuestions > 0 ? (correctAnswers / totalQuestions) * 100 : Number(result?.accuracyPercent ?? 0);

          percentText.textContent = fmtPercent(accuracyPercent) + "%";
          accuracyNote.textContent = totalQuestions > 0 ? `(${correctAnswers}/${totalQuestions} correct)` : "";

          totalQuestionsText.textContent = totalQuestions;
          attemptedText.textContent = attemptedCount;
          notAttemptedText.textContent = notAttemptedCount;
          scoreText.textContent = score + (totalQuestions > 0 ? ` / ${totalQuestions}` : "");
          correctAnswersText.textContent = correctAnswers;

          setCircleProgress(accuracyPercent);
          scoreHint.textContent = "Submitted result fetched successfully.";
        } catch (e) {
          showError("Failed to load result. Please submit again.");
        }
      })();
    </script>
  </body>
</html>
