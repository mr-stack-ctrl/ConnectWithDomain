<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exam Result</title>
    <style>
      :root {
        --bg: #eef4ff;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0b5ed7;
        --primary-2: #0a4fb3;
        --border: rgba(15, 23, 42, 0.12);
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        --success: #16a34a;
        --danger: #dc2626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, #e8f1ff, var(--bg));
        color: var(--text);
      }

      header {
        background: linear-gradient(90deg, var(--primary), #0f766e);
        color: white;
        padding: 16px 18px;
        box-shadow: var(--shadow);
      }

      header .wrap {
        max-width: 980px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      header h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 700;
      }

      header a {
        font-size: 13px;
        color: white;
        text-decoration: underline;
        opacity: 0.95;
      }

      main {
        max-width: 980px;
        margin: 18px auto 40px;
        padding: 0 14px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 16px;
      }

      .grid {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 16px;
        align-items: start;
      }

      @media (max-width: 820px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .title-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .subtitle {
        margin: 0;
        font-size: 13px;
        color: var(--muted);
      }

      .result-wrap {
        display: grid;
        place-items: center;
        padding: 14px 10px;
      }

      .accuracy-circle {
        position: relative;
        width: 240px;
        height: 240px;
      }

      .accuracy-circle svg {
        width: 240px;
        height: 240px;
        display: block;
      }

      .accuracy-center {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 0 18px;
      }

      .accuracy-center .percent {
        font-size: 34px;
        font-weight: 900;
      }

      .accuracy-center .label {
        font-size: 13px;
        color: var(--muted);
        margin-top: 6px;
      }

      .stat-grid {
        display: grid;
        gap: 10px;
      }

      .stat-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        background: #fbfdff;
      }

      .stat-card .k {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .stat-card .v {
        font-size: 18px;
        font-weight: 900;
      }

      .stat-card.good .v {
        color: var(--success);
      }

      .stat-card.bad .v {
        color: var(--danger);
      }

      .small {
        font-size: 12px;
        color: var(--muted);
      }

      .error {
        margin-top: 10px;
        color: #b91c1c;
        font-size: 13px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <h1>Exam Result</h1>
        <a href="index.html">Back to Exam</a>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="title-row">
          <div>
            <h2 style="margin:0; font-size:18px;">Your Performance</h2>
            <p class="subtitle" id="examNameText">Loading...</p>
          </div>
          <div class="small" id="accuracyNote"></div>
        </div>

        <div class="grid">
          <div class="result-wrap">
            <div class="accuracy-circle" aria-label="Accuracy percentage">
              <svg viewBox="0 0 240 240">
                <defs>
                  <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1">
                    <stop offset="0%" stop-color="#0b5ed7" />
                    <stop offset="100%" stop-color="#0f766e" />
                  </linearGradient>
                </defs>
                <circle cx="120" cy="120" r="92" stroke="rgba(15,23,42,0.12)" stroke-width="16" fill="none" />
                <circle
                  id="progressCircle"
                  cx="120"
                  cy="120"
                  r="92"
                  stroke="url(#grad)"
                  stroke-width="16"
                  fill="none"
                  stroke-linecap="round"
                  transform="rotate(-90 120 120)"
                  stroke-dasharray="0 9999"
                />
              </svg>
              <div class="accuracy-center">
                <div class="percent" id="percentText">0%</div>
                <div class="label">Accuracy</div>
              </div>
            </div>
            <div class="small" id="scoreHint" style="margin-top:10px;"></div>
          </div>

          <div class="stat-grid">
            <div class="stat-card">
              <div class="k">Total Questions</div>
              <div class="v" id="totalQuestionsText">-</div>
            </div>
            <div class="stat-card">
              <div class="k">Total Attempted</div>
              <div class="v good" style="color: var(--success);" id="attemptedText">-</div>
            </div>
            <div class="stat-card">
              <div class="k">Not Attempted</div>
              <div class="v bad" style="color: var(--danger);" id="notAttemptedText">-</div>
            </div>
            <div class="stat-card good">
              <div class="k">Total Marks (Score)</div>
              <div class="v" id="scoreText">-</div>
            </div>
            <div class="stat-card">
              <div class="k">Correct Answers</div>
              <div class="v" id="correctAnswersText">-</div>
            </div>
          </div>
        </div>

        <div id="errorBox" class="error" style="display:none;"></div>
      </section>
    </main>

    <script>
      (function () {
        const errorBox = document.getElementById("errorBox");
        const progressCircle = document.getElementById("progressCircle");

        const examNameText = document.getElementById("examNameText");
        const accuracyNote = document.getElementById("accuracyNote");
        const percentText = document.getElementById("percentText");
        const scoreHint = document.getElementById("scoreHint");

        const totalQuestionsText = document.getElementById("totalQuestionsText");
        const attemptedText = document.getElementById("attemptedText");
        const notAttemptedText = document.getElementById("notAttemptedText");
        const scoreText = document.getElementById("scoreText");
        const correctAnswersText = document.getElementById("correctAnswersText");

        function showError(msg) {
          errorBox.textContent = msg;
          errorBox.style.display = "block";
        }

        function setCircleProgress(percent) {
          const p = Math.max(0, Math.min(100, Number(percent) || 0));

          const r = 92;
          const circumference = 2 * Math.PI * r;
          const dashArray = circumference;
          const dashOffset = circumference * (1 - p / 100);

          progressCircle.setAttribute("stroke-dasharray", dashArray + " " + dashArray);
          progressCircle.setAttribute("stroke-dashoffset", dashOffset);
        }

        function fmtPercent(p) {
          return Math.round((Number(p) || 0) * 10) / 10;
        }

        try {
          const raw = sessionStorage.getItem("examResult");
          if (!raw) {
            showError("No result data found. Please submit an exam first.");
            return;
          }
          const result = JSON.parse(raw);

          const examName = result?.examName ?? "";
          examNameText.textContent = examName ? `Exam: ${examName}` : "Exam: -";

          const totalQuestions = Number(result?.totalQuestions ?? 0);
          const correctAnswers = Number(result?.correctAnswers ?? 0);
          const score = Number(result?.score ?? 0);
          const attemptedCount = Number(result?.attemptedCount ?? 0);
          const notAttemptedCount = Number(result?.notAttemptedCount ?? 0);

          const accuracyPercent = totalQuestions > 0 ? (correctAnswers / totalQuestions) * 100 : Number(result?.accuracyPercent ?? 0);

          percentText.textContent = fmtPercent(accuracyPercent) + "%";
          accuracyNote.textContent = totalQuestions > 0 ? `(${correctAnswers}/${totalQuestions} correct)` : "";

          totalQuestionsText.textContent = totalQuestions;
          attemptedText.textContent = attemptedCount;
          notAttemptedText.textContent = notAttemptedCount;
          scoreText.textContent = score + (totalQuestions > 0 ? ` / ${totalQuestions}` : "");
          correctAnswersText.textContent = correctAnswers;

          setCircleProgress(accuracyPercent);
          scoreHint.textContent = "Submitted result fetched successfully.";
        } catch (e) {
          showError("Failed to load result. Please submit again.");
        }
      })();
    </script>
  </body>
</html>
